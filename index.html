<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submitted Photo Map</title>
<link rel="stylesheet" href="style.css" />
<script src="javascript.js"></script>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="photo-map-dashboard">
    <div class="photo-map-header">
      <div>
        <div class="eyebrow">Photo Location Dashboard</div>
        <h1>Submitted Photo Map</h1>
        <p>Approved photo submissions plotted by location.</p>
      </div>

      <div class="photo-map-stats">
        <div class="stat">
          <span id="photoCount">0</span>
          <label>Photos</label>
        </div>

        <div class="stat stat-wide" id="farthestPhoto">
          <span>—</span>
          <label>Farthest From Station 1</label>
        </div>

        <div class="stat">
          <span id="lastUpdated">—</span>
          <label>Last Updated</label>
        </div>
      </div>
    </div>

    <div class="photo-map-layout">
      <div id="photoMap"></div>

      <aside class="photo-list-panel">
        <div class="panel-title photo-list-title">Most Recent Photos</div>
        <div id="photoList" class="photo-list"></div>
      </aside>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- PapaParse -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- Your JS - must come last -->
  <script src="javascript.js"></script>
</body>
</html>
